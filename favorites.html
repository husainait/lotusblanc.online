<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وصفاتي المفضلة - Lotus Blanc</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* استعملي نفس الـ CSS ديال الموقع باش يبقى اللون Sage */
        :root { --sage: #C0729A; --bg: #fdfafb; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .fav-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .fav-card h3 { color: #333; font-size: 1.1rem; }
        .btn-view { display: inline-block; padding: 8px 15px; background: var(--sage); color: white; text-decoration: none; border-radius: 5px; margin-top: 10px; }
        .btn-delete { background: #e74c3c; cursor: pointer; border: none; color: white; padding: 8px 15px; border-radius: 5px; margin-right: 5px; }
        .empty-msg { text-align: center; padding: 50px; color: #777; }
    </style>
</head>
<body>

    <h1 style="text-align:center; color:var(--sage);">❤️ مفضلتي</h1>
    <div id="favorites-container" class="fav-grid">
        <!-- هنا غيبانو الوصفات -->
    </div>

    <script>
        function loadFavorites() {
            const container = document.getElementById('favorites-container');
            const favorites = JSON.parse(localStorage.getItem('myFavorites')) || [];

            if (favorites.length === 0) {
                container.innerHTML = '<div class="empty-msg"><h3>قائمة المفضلة فارغة حالياً.</h3><p>تصفحي الوصفات واضغطي على القلب لإضافتها هنا!</p></div>';
                return;
            }

            container.innerHTML = favorites.map((fav, index) => `
                <div class="fav-card">
                    <h3>${fav.title}</h3>
                    <p style="font-size:0.8rem; color:#999;">تاريخ الحفظ: ${fav.date}</p>
                    <a href="${fav.url}" class="btn-view">عرض الوصفة</a>
                    <button onclick="removeFavorite(${index})" class="btn-delete">حذف</button>
                </div>
            `).join('');
        }

        function removeFavorite(index) {
            let favorites = JSON.parse(localStorage.getItem('myFavorites')) || [];
            favorites.splice(index, 1);
            localStorage.setItem('myFavorites', JSON.stringify(favorites));
            loadFavorites(); // إعادة تحميل الصفحة
        }

        // تشغيل الدالة عند فتح الصفحة
        window.onload = loadFavorites;
    </script>
</body>
</html>
