<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotus Blanc - Recettes</title>

<style>
body{margin:0;font-family:Arial;background:#f9f9f9}
header{padding:15px;background:white;border-bottom:1px solid #eee;font-weight:bold}
.page{display:none;padding:20px}
.page.active{display:block}

.articles-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px
}

.cat-card,.article-card{
background:white;
border:1px solid #eee;
border-radius:12px;
padding:20px;
cursor:pointer;
transition:.2s;
}

.cat-card:hover,.article-card:hover{
transform:translateY(-3px);
border-color:#c0729a;
}

.back-btn{
margin-bottom:20px;
cursor:pointer;
border:none;
background:none;
font-size:14px;
}

h1{margin:0 0 10px}
p{color:gray}

.fade-in{animation:fade .3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>

<body>

<header>Lotus Blanc</header>

<!-- HOME -->
<div id="home" class="page active">

<h2>Catégories</h2>

<div class="articles-grid">
  <div class="cat-card" onclick="openCategory('salade','Recettes de salades fraîches')">🥗 Salades</div>
  <div class="cat-card" onclick="openCategory('dessert','Desserts sucrés')">🍰 Desserts</div>
  <div class="cat-card" onclick="openCategory('plat','Plats principaux')">🍲 Plats</div>
</div>

<h2>Recettes</h2>

<div class="articles-grid">

  <div class="article-card" data-category="salade">Salade César</div>
  <div class="article-card" data-category="salade">Salade Marocaine</div>

  <div class="article-card" data-category="dessert">Tiramisu</div>
  <div class="article-card" data-category="dessert">Cake Chocolat</div>

  <div class="article-card" data-category="plat">Couscous</div>
  <div class="article-card" data-category="plat">Pizza Maison</div>

</div>

</div>

<!-- CATEGORY PAGE -->
<div id="category-page" class="page">

<button class="back-btn" onclick="showPage('home')">← Retour</button>

<h1 id="cat-title"></h1>
<p id="cat-desc"></p>

<div id="cat-results" class="articles-grid"></div>

</div>

<script>

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openCategory(cat,desc){

  showPage('category-page');

  document.getElementById('cat-title').innerText = cat.toUpperCase();
  document.getElementById('cat-desc').innerText = desc;

  let all = document.querySelectorAll('.article-card');
  let container = document.getElementById('cat-results');
  container.innerHTML = '';

  let found=false;

  all.forEach(card=>{
    if(card.dataset.category === cat){
      container.appendChild(card.cloneNode(true));
      found=true;
    }
  });

  if(!found){
    container.innerHTML="<p>Aucune recette 😢</p>";
  }
}

</script>

</body>
</html>
