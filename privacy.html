<!DOCTYPE html>
<html lang="fr" id="content-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy — Lotus Blanc</title>
    <style>
        body { font-family: 'Jost', sans-serif; line-height: 1.6; color: #2C2035; padding: 40px; max-width: 800px; margin: auto; background: #FDF5F8; }
        .lang-btn { cursor: pointer; padding: 5px 10px; border: 1px solid #C0729A; border-radius: 5px; background: white; margin-bottom: 20px; }
        [lang="ar"] { display: none; direction: rtl; text-align: right; }
        [lang="en"] { display: none; }
        [lang="fr"] { display: block; }
    </style>
</head>
<body>
    <div style="margin-bottom: 30px;">
        <button class="lang-btn" onclick="changeLang('fr')">Français</button>
        <button class="lang-btn" onclick="changeLang('ar')">العربية</button>
        <button class="lang-btn" onclick="changeLang('en')">English</button>
    </div>

    <div class="lang-content" lang="fr">
        <h1>Politique de Confidentialité</h1>
        <p>Nous utilisons des cookies pour améliorer votre expérience...</p>
    </div>

    <div class="lang-content" lang="ar">
        <h1>سياسة الخصوصية</h1>
        <p>نحن نستخدم ملفات تعريف الارتباط لتحسين تجربتك...</p>
    </div>

    <div class="lang-content" lang="en">
        <h1>Privacy Policy</h1>
        <p>We use cookies to improve your experience...</p>
    </div>

    <script>
        function changeLang(lang) {
            // إخفاء كاع اللغات
            document.querySelectorAll('.lang-content').forEach(el => el.style.display = 'none');
            // إظهار اللغة المطلوبة
            document.querySelectorAll('[lang="'+lang+'"]').forEach(el => el.style.display = 'block');
            // تغيير اتجاه الصفحة إيلا كانت عربية
            document.body.style.direction = (lang === 'ar') ? 'rtl' : 'ltr';
        }
    </script>
</body>
</html>
